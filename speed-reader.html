<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans TC', 'Noto Sans', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ── Input Screen ── */
    #input-screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .screen-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.02em;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 14px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Noto Sans TC', 'Noto Sans', sans-serif;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #1a1a1a;
      background: #fff;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #b0b0b0;
    }

    textarea::placeholder {
      color: #bbb;
    }

    .btn-start {
      align-self: flex-end;
      padding: 10px 28px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-start:hover {
      background: #333;
    }

    .btn-start:active {
      transform: scale(0.97);
    }

    .btn-start:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ── Reader Screen ── */
    #reader-screen {
      display: none;
      flex-direction: column;
      gap: 20px;
    }

    /* RSVP Display */
    .rsvp-box {
      background: #fff;
      border: 1.5px solid #e8e8e8;
      border-radius: 14px;
      padding: 0;
      height: 160px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Red focal line — top */
    .focal-line-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #e53935;
      border-radius: 2px 2px 0 0;
    }

    /* Red focal line — bottom */
    .focal-line-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: #e53935;
      border-radius: 0 0 2px 2px;
    }

    /* Focal dot marker */
    .focal-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #e53935;
      opacity: 0.25;
      pointer-events: none;
    }

    #word-display {
      font-size: 2.5rem;
      font-weight: 500;
      font-family: 'Noto Sans', 'Noto Sans TC', sans-serif;
      letter-spacing: 0.01em;
      color: #1a1a1a;
      text-align: center;
      padding: 0 32px;
      line-height: 1;
      user-select: none;
      position: relative;
      z-index: 1;
      transition: opacity 0.06s ease;
    }

    /* Highlight the pivot/focus letter */
    #word-display .pivot {
      color: #e53935;
    }

    /* ── Progress ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar-track {
      flex: 1;
      height: 5px;
      background: #e8e8e8;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1a1a1a;
      border-radius: 999px;
      width: 0%;
      transition: width 0.15s linear;
    }

    .progress-pct {
      font-size: 0.78rem;
      color: #999;
      min-width: 34px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* ── WPM Control ── */
    .wpm-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .wpm-label {
      font-size: 0.82rem;
      color: #666;
      white-space: nowrap;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      background: #e0e0e0;
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #1a1a1a;
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .wpm-value {
      font-size: 0.82rem;
      font-weight: 700;
      color: #1a1a1a;
      min-width: 52px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1.5px solid #e0e0e0;
      background: #fff;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      flex-shrink: 0;
    }

    .btn-icon:hover {
      background: #f0f0f0;
      border-color: #ccc;
    }

    .btn-icon:active {
      transform: scale(0.93);
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .btn-play-pause {
      width: 54px;
      height: 54px;
      background: #1a1a1a;
      border: none;
      color: #fff;
    }

    .btn-play-pause:hover {
      background: #333;
      border-color: transparent;
    }

    .btn-play-pause svg {
      width: 22px;
      height: 22px;
    }

    /* Mute button — active (muted) state */
    .btn-icon.muted {
      color: #bbb;
      border-color: #e8e8e8;
    }

    /* Back button */
    .btn-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: #999;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
      align-self: flex-start;
    }

    .btn-back:hover {
      color: #555;
    }

    .btn-back svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Done state */
    #done-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    #done-overlay.visible {
      display: flex;
    }

    .done-text {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .done-sub {
      font-size: 0.8rem;
      color: #999;
    }

    /* Hint */
    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #bbb;
    }

    /* Speech support warning */
    .speech-warning {
      text-align: center;
      font-size: 0.75rem;
      color: #e57373;
      display: none;
    }

    .speech-warning.visible {
      display: block;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Input Screen -->
  <div id="input-screen">
    <p class="screen-title">Speed Reader</p>
    <textarea id="text-input" placeholder="Paste your text here..."></textarea>
    <button class="btn-start" id="btn-start" disabled>開始閱讀</button>
  </div>

  <!-- Reader Screen -->
  <div id="reader-screen">

    <button class="btn-back" id="btn-back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      重新輸入文字
    </button>

    <div class="rsvp-box" id="rsvp-box">
      <div class="focal-line-top"></div>
      <div class="focal-line-bottom"></div>
      <div class="focal-dot"></div>
      <div id="word-display">—</div>
      <div id="done-overlay">
        <p class="done-text">閱讀完成</p>
        <p class="done-sub">按重置可重新播放</p>
      </div>
    </div>

    <div class="progress-row">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </div>

    <div class="wpm-row">
      <span class="wpm-label">速度</span>
      <input type="range" id="wpm-slider" min="100" max="800" step="10" value="300" />
      <span class="wpm-value" id="wpm-display">300 WPM</span>
    </div>

    <div class="controls">
      <button class="btn-icon" id="btn-reset" title="重置">
        <svg viewBox="0 0 24 24"><path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>

      <button class="btn-icon btn-play-pause" id="btn-play-pause" title="播放 / 暫停 (空白鍵)">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <!-- Step back one word -->
      <button class="btn-icon" id="btn-step-back" title="上一個字">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>

      <!-- Mute / Unmute -->
      <button class="btn-icon" id="btn-mute" title="靜音 / 開聲">
        <!-- Volume on icon -->
        <svg id="icon-volume-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <!-- Volume off (muted) icon -->
        <svg id="icon-volume-off" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
      </button>
    </div>

    <p class="hint">空白鍵 = 播放 / 暫停</p>
    <p class="speech-warning" id="speech-warning">此瀏覽器不支援 Web Speech API，朗讀功能無法使用</p>

  </div>
</div>

<script>
  // ── DOM refs ──
  const inputScreen    = document.getElementById('input-screen');
  const readerScreen   = document.getElementById('reader-screen');
  const textInput      = document.getElementById('text-input');
  const btnStart       = document.getElementById('btn-start');
  const btnBack        = document.getElementById('btn-back');
  const wordDisplay    = document.getElementById('word-display');
  const progressFill   = document.getElementById('progress-fill');
  const progressPct    = document.getElementById('progress-pct');
  const wpmSlider      = document.getElementById('wpm-slider');
  const wpmDisplay     = document.getElementById('wpm-display');
  const btnPlayPause   = document.getElementById('btn-play-pause');
  const btnReset       = document.getElementById('btn-reset');
  const btnStepBack    = document.getElementById('btn-step-back');
  const btnMute        = document.getElementById('btn-mute');
  const iconPlay       = document.getElementById('icon-play');
  const iconPause      = document.getElementById('icon-pause');
  const iconVolumeOn   = document.getElementById('icon-volume-on');
  const iconVolumeOff  = document.getElementById('icon-volume-off');
  const doneOverlay    = document.getElementById('done-overlay');
  const speechWarning  = document.getElementById('speech-warning');

  // ── Speech Synthesis setup ──
  const synth = window.speechSynthesis;
  const speechSupported = !!synth;

  if (!speechSupported) {
    speechWarning.classList.add('visible');
  }

  // ── State ──
  let words    = [];
  let index    = 0;
  let wpm      = 300;
  let playing  = false;
  let timer    = null;
  let done     = false;
  let muted    = false;

  // ── Speech rate mapping ──
  // WPM 100 → rate 0.6, WPM 300 → rate 1.0, WPM 800 → rate 2.5
  // SpeechSynthesisUtterance.rate range: 0.1 – 10 (Chrome) / 0.1 – 10 (Safari)
  // Practical usable range: 0.5 – 3.0
  function wpmToSpeechRate(w) {
    // Linear interpolation: rate = 0.5 + (w - 100) / (800 - 100) * (3.0 - 0.5)
    const rate = 0.5 + ((w - 100) / 700) * 2.5;
    return Math.round(rate * 100) / 100; // 2 decimal places
  }

  // Speak a single word (fire-and-forget, not awaited)
  function speakWord(word) {
    if (!speechSupported || muted) return;
    // Cancel any still-pending speech to stay in sync
    synth.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang = 'en-US';
    utt.rate = wpmToSpeechRate(wpm);
    utt.volume = 1;
    synth.speak(utt);
  }

  // Stop speech immediately
  function stopSpeech() {
    if (speechSupported) synth.cancel();
  }

  // ── Helpers ──
  function tokenize(text) {
    return text.trim().split(/\s+/).filter(w => w.length > 0);
  }

  function pivotIndex(word) {
    const len = word.length;
    if (len <= 1) return 0;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
  }

  function renderWord(word) {
    if (!word) { wordDisplay.textContent = '—'; return; }
    const pi = pivotIndex(word);
    const before = word.slice(0, pi);
    const pivot  = word[pi];
    const after  = word.slice(pi + 1);
    wordDisplay.innerHTML =
      `<span class="before">${escHtml(before)}</span>` +
      `<span class="pivot">${escHtml(pivot)}</span>` +
      `<span class="after">${escHtml(after)}</span>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateProgress() {
    const pct = words.length > 0
      ? Math.round((index / words.length) * 100)
      : 0;
    progressFill.style.width = pct + '%';
    progressPct.textContent  = pct + '%';
  }

  function msPerWord() {
    return Math.round(60000 / wpm);
  }

  function delayForWord(word) {
    let base = msPerWord();
    if (/[.!?]$/.test(word)) base *= 1.8;
    else if (/[,;:]$/.test(word)) base *= 1.3;
    if (word.length > 8) base *= 1.1;
    return Math.round(base);
  }

  function showWord() {
    if (index >= words.length) {
      stop();
      done = true;
      doneOverlay.classList.add('visible');
      stopSpeech();
      updateProgress();
      return;
    }
    const word = words[index];
    renderWord(word);
    speakWord(word);
    updateProgress();
    index++;
    timer = setTimeout(showWord, delayForWord(word));
  }

  function play() {
    if (done) return;
    playing = true;
    iconPlay.style.display  = 'none';
    iconPause.style.display = '';
    showWord();
  }

  function pause() {
    playing = false;
    iconPlay.style.display  = '';
    iconPause.style.display = 'none';
    clearTimeout(timer);
    stopSpeech();
  }

  function stop() {
    pause();
  }

  function reset() {
    stop();
    done  = false;
    index = 0;
    doneOverlay.classList.remove('visible');
    renderWord(words[0] || '');
    updateProgress();
  }

  function togglePlayPause() {
    if (done) return;
    if (playing) pause();
    else play();
  }

  function toggleMute() {
    muted = !muted;
    if (muted) {
      btnMute.classList.add('muted');
      iconVolumeOn.style.display  = 'none';
      iconVolumeOff.style.display = '';
      stopSpeech();
    } else {
      btnMute.classList.remove('muted');
      iconVolumeOn.style.display  = '';
      iconVolumeOff.style.display = 'none';
    }
  }

  // ── Events ──

  textInput.addEventListener('input', () => {
    btnStart.disabled = textInput.value.trim().length === 0;
  });

  btnStart.addEventListener('click', () => {
    words = tokenize(textInput.value);
    if (words.length === 0) return;
    index = 0;
    done  = false;
    doneOverlay.classList.remove('visible');

    inputScreen.style.display  = 'none';
    readerScreen.style.display = 'flex';

    renderWord(words[0]);
    updateProgress();
  });

  btnBack.addEventListener('click', () => {
    stop();
    readerScreen.style.display = 'none';
    inputScreen.style.display  = 'flex';
  });

  btnPlayPause.addEventListener('click', togglePlayPause);

  btnReset.addEventListener('click', reset);

  btnStepBack.addEventListener('click', () => {
    pause();
    if (index > 1) index -= 2;
    else index = 0;
    done = false;
    doneOverlay.classList.remove('visible');
    renderWord(words[index] || '');
    updateProgress();
  });

  btnMute.addEventListener('click', toggleMute);

  wpmSlider.addEventListener('input', () => {
    wpm = parseInt(wpmSlider.value, 10);
    wpmDisplay.textContent = wpm + ' WPM';
    if (playing) {
      clearTimeout(timer);
      timer = setTimeout(showWord, msPerWord());
    }
  });

  document.addEventListener('keydown', (e) => {
    if (readerScreen.style.display === 'flex' && e.code === 'Space') {
      e.preventDefault();
      togglePlayPause();
    }
  });

  // ── Safari workaround ──
  // Safari requires speechSynthesis.getVoices() to be called at least once
  // after a user gesture to unlock the audio context.
  // Calling getVoices() proactively here; actual speech is triggered only
  // via btnPlayPause click (a user gesture), which satisfies Safari's policy.
  if (speechSupported) {
    synth.getVoices();
    // Some browsers load voices asynchronously
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = () => { synth.getVoices(); };
    }
  }
</script>
</body>
</html>
